<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KASAI — FIRE ORB 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Outfit', sans-serif;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, #0f0505 0%, #050208 50%, #000 100%);
  }

  /* ── 3D ORB SCENE ── */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
    z-index: 5;
  }

  .orb-container {
    transform-style: preserve-3d;
    width: 220px;
    height: 220px;
    position: relative;
    animation: orb-float 5s ease-in-out infinite;
  }
  @keyframes orb-float {
    0%, 100% { transform: translateY(0) rotateX(0deg); }
    50% { transform: translateY(-25px) rotateX(5deg); }
  }

  /* Rotating rings */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 2px solid;
    transform-style: preserve-3d;
    animation: ring-spin linear infinite;
  }

  .ring-1 {
    width: 200px;
    height: 200px;
    margin: -100px 0 0 -100px;
    border-color: rgba(255,107,0,0.4);
    animation-duration: 6s;
    transform: rotateX(70deg) rotateY(0deg);
    box-shadow: 0 0 15px rgba(255,107,0,0.2), inset 0 0 15px rgba(255,107,0,0.1);
  }
  .ring-2 {
    width: 190px;
    height: 190px;
    margin: -95px 0 0 -95px;
    border-color: rgba(255,202,40,0.3);
    animation-duration: 8s;
    animation-direction: reverse;
    transform: rotateX(70deg) rotateZ(60deg);
    box-shadow: 0 0 12px rgba(255,202,40,0.15), inset 0 0 12px rgba(255,202,40,0.08);
  }
  .ring-3 {
    width: 210px;
    height: 210px;
    margin: -105px 0 0 -105px;
    border-color: rgba(255,45,85,0.25);
    animation-duration: 10s;
    transform: rotateX(70deg) rotateZ(120deg);
    box-shadow: 0 0 10px rgba(255,45,85,0.15), inset 0 0 10px rgba(255,45,85,0.08);
  }
  .ring-4 {
    width: 180px;
    height: 180px;
    margin: -90px 0 0 -90px;
    border-color: rgba(255,149,0,0.35);
    animation-duration: 7s;
    transform: rotateY(70deg) rotateZ(45deg);
    box-shadow: 0 0 12px rgba(255,149,0,0.2);
  }
  .ring-5 {
    width: 195px;
    height: 195px;
    margin: -97.5px 0 0 -97.5px;
    border-color: rgba(255,80,30,0.2);
    animation-duration: 9s;
    animation-direction: reverse;
    transform: rotateY(70deg) rotateZ(135deg);
    box-shadow: 0 0 8px rgba(255,80,30,0.15);
  }

  @keyframes ring-spin {
    from { transform: rotateX(70deg) rotateZ(var(--start, 0deg)); }
    to { transform: rotateX(70deg) rotateZ(calc(var(--start, 0deg) + 360deg)); }
  }
  /* Override with individual animations for proper 3D */
  .ring-1 { animation-name: r1; }
  .ring-2 { animation-name: r2; }
  .ring-3 { animation-name: r3; }
  .ring-4 { animation-name: r4; }
  .ring-5 { animation-name: r5; }
  @keyframes r1 { from { transform: rotateX(70deg) rotateZ(0deg); } to { transform: rotateX(70deg) rotateZ(360deg); } }
  @keyframes r2 { from { transform: rotateX(70deg) rotateZ(60deg); } to { transform: rotateX(70deg) rotateZ(-300deg); } }
  @keyframes r3 { from { transform: rotateX(70deg) rotateZ(120deg); } to { transform: rotateX(70deg) rotateZ(480deg); } }
  @keyframes r4 { from { transform: rotateY(70deg) rotateZ(45deg); } to { transform: rotateY(70deg) rotateZ(405deg); } }
  @keyframes r5 { from { transform: rotateY(70deg) rotateZ(135deg); } to { transform: rotateY(70deg) rotateZ(-225deg); } }

  /* Ring nodes (glowing dots on rings) */
  .ring::before, .ring::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ffca28;
    box-shadow: 0 0 12px #ff6b00, 0 0 24px rgba(255,107,0,0.5);
  }
  .ring::before { top: -4px; left: 50%; margin-left: -4px; }
  .ring::after { bottom: -4px; left: 50%; margin-left: -4px; }
  .ring-1::before, .ring-1::after { background: #ff6b00; box-shadow: 0 0 12px #ff6b00; }
  .ring-2::before, .ring-2::after { background: #ffca28; box-shadow: 0 0 12px #ffca28; width:6px; height:6px; }
  .ring-3::before, .ring-3::after { background: #ff2d55; box-shadow: 0 0 12px #ff2d55; width:5px; height:5px; }

  /* Core sphere */
  .orb-core {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80px;
    height: 80px;
    margin: -40px 0 0 -40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,230,180,1), rgba(255,180,50,0.9) 30%, rgba(255,100,0,0.7) 60%, rgba(255,45,85,0.4) 100%);
    box-shadow:
      0 0 40px rgba(255,150,50,0.6),
      0 0 80px rgba(255,100,0,0.4),
      0 0 120px rgba(255,60,20,0.2),
      inset -10px -10px 20px rgba(200,50,0,0.3),
      inset 5px 5px 15px rgba(255,230,180,0.3);
    animation: core-breathe 3s ease-in-out infinite;
  }
  @keyframes core-breathe {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 0 40px rgba(255,150,50,0.6), 0 0 80px rgba(255,100,0,0.4), 0 0 120px rgba(255,60,20,0.2);
    }
    50% {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(255,150,50,0.8), 0 0 100px rgba(255,100,0,0.5), 0 0 160px rgba(255,60,20,0.3);
    }
  }

  /* Orb outer glow */
  .orb-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 160px;
    height: 160px;
    margin: -80px 0 0 -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,0.15) 0%, transparent 70%);
    filter: blur(20px);
    animation: glow-rotate 8s linear infinite;
  }
  @keyframes glow-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Shadow on ground */
  .orb-shadow {
    position: fixed;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(255,80,0,0.15), transparent 70%);
    filter: blur(15px);
    z-index: 4;
    animation: shadow-sync 5s ease-in-out infinite;
  }
  @keyframes shadow-sync {
    0%, 100% { width: 180px; opacity: 0.8; }
    50% { width: 120px; opacity: 0.4; }
  }

  /* ── TEXT ── */
  .logo-top {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 0.5s forwards;
  }
  .logo-top-name {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.3em;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .quote-center {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    white-space: nowrap;
  }
  .q-line-1 {
    font-size: clamp(44px, 10vw, 80px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #ffffff;
    opacity: 0;
    animation: orb-text-in 1.2s cubic-bezier(0.16,1,0.3,1) 2s forwards;
  }
  .q-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 2.5vw, 16px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.4);
    margin-top: 12px;
    opacity: 0;
    animation: orb-text-in 1s ease 2.8s forwards;
  }
  @keyframes orb-text-in {
    from { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(8px); }
    to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .bottom-tag {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 3.5s forwards;
  }
  .tag-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.2);
  }

  @keyframes fade-in { to { opacity: 1; } }

  .overlay-v {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse 65% 60% at 50% 50%, transparent 25%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay-v"></div>
<div class="orb-shadow"></div>

<div class="scene">
  <div class="orb-container">
    <div class="orb-glow"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
    <div class="ring ring-5"></div>
    <div class="orb-core"></div>
  </div>
</div>

<div class="logo-top">
  <div class="logo-top-name">KASAI</div>
</div>

<div class="quote-center">
  <div class="q-line-1">IGNITE</div>
  <div class="q-sub">Your inner fire</div>
</div>

<div class="bottom-tag">
  <div class="tag-text">火 · Train like fire</div>
</div>

</body>
</html>
