<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KASAI — BURN BRIGHTER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Outfit', sans-serif;
  }

  /* ── BG: Rising ember field ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(180deg, #02010a 0%, #0a0308 50%, #120600 100%);
  }

  /* Bottom fire glow */
  .fire-glow {
    position: fixed;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 100vw;
    height: 300px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,107,0,0.2) 0%, rgba(255,45,85,0.08) 40%, transparent 70%);
    filter: blur(30px);
    z-index: 1;
    animation: glow-breathe 3s ease-in-out infinite;
  }
  @keyframes glow-breathe {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scaleY(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleY(1.2); }
  }

  /* Ember particles rising from bottom */
  .ember {
    position: fixed;
    border-radius: 50%;
    z-index: 4;
    pointer-events: none;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    10% { opacity: 1; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.2); }
  }
  .e1  { width:3px; height:3px; left:10%; bottom:-10px; background:#ff6b00; animation-duration:5s; animation-delay:0s; box-shadow:0 0 4px #ff6b00; }
  .e2  { width:2px; height:2px; left:20%; bottom:-10px; background:#ffca28; animation-duration:6s; animation-delay:0.8s; box-shadow:0 0 3px #ffca28; }
  .e3  { width:4px; height:4px; left:35%; bottom:-10px; background:#ff2d55; animation-duration:4.5s; animation-delay:0.3s; box-shadow:0 0 6px #ff2d55; }
  .e4  { width:2px; height:2px; left:45%; bottom:-10px; background:#ff9500; animation-duration:5.5s; animation-delay:1.2s; box-shadow:0 0 3px #ff9500; }
  .e5  { width:3px; height:3px; left:55%; bottom:-10px; background:#ffca28; animation-duration:4s; animation-delay:0.5s; box-shadow:0 0 5px #ffca28; }
  .e6  { width:2px; height:2px; left:65%; bottom:-10px; background:#ff6b00; animation-duration:6.5s; animation-delay:1.5s; box-shadow:0 0 3px #ff6b00; }
  .e7  { width:3px; height:3px; left:75%; bottom:-10px; background:#ff2d55; animation-duration:5s; animation-delay:0.7s; box-shadow:0 0 4px #ff2d55; }
  .e8  { width:2px; height:2px; left:85%; bottom:-10px; background:#ff9500; animation-duration:4.8s; animation-delay:1s; box-shadow:0 0 3px #ff9500; }
  .e9  { width:4px; height:4px; left:50%; bottom:-10px; background:#ffca28; animation-duration:5.2s; animation-delay:2s; box-shadow:0 0 6px #ffca28; }
  .e10 { width:2px; height:2px; left:30%; bottom:-10px; background:#ff6b00; animation-duration:5.8s; animation-delay:1.8s; box-shadow:0 0 3px #ff6b00; }
  .e11 { width:3px; height:3px; left:60%; bottom:-10px; background:#ff2d55; animation-duration:4.2s; animation-delay:2.5s; box-shadow:0 0 4px #ff2d55; }
  .e12 { width:2px; height:2px; left:8%;  bottom:-10px; background:#ffca28; animation-duration:6.2s; animation-delay:0.2s; box-shadow:0 0 3px #ffca28; }
  .e13 { width:3px; height:3px; left:92%; bottom:-10px; background:#ff6b00; animation-duration:5.4s; animation-delay:1.4s; box-shadow:0 0 4px #ff6b00; }

  .overlay-vignette {
    position: fixed;
    inset: 0;
    z-index: 5;
    background: radial-gradient(ellipse 60% 50% at 50% 45%, transparent 10%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
  }

  /* ── CONTENT ── */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Logo: Phoenix flame */
  .logo-wrap {
    opacity: 0;
    animation: rise-up 1.5s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    margin-bottom: 40px;
  }
  @keyframes rise-up {
    from { opacity: 0; transform: translateY(40px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .logo-flame-wrap {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    position: relative;
    animation: flame-hover 2.5s ease-in-out infinite;
  }
  @keyframes flame-hover {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .logo-flame-wrap::before {
    content: '';
    position: absolute;
    bottom: -8px;
    width: 30px;
    height: 6px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.3), transparent);
    filter: blur(4px);
    animation: shadow-pulse 2.5s ease-in-out infinite;
  }
  @keyframes shadow-pulse {
    0%, 100% { width: 30px; opacity: 0.6; }
    50% { width: 20px; opacity: 0.3; }
  }

  .logo-name {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.25em;
    text-align: center;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── QUOTE: Rise from below ── */
  .quote {
    text-align: center;
  }

  .q-line {
    overflow: hidden;
  }

  .q-word {
    font-size: clamp(46px, 11vw, 88px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.05;
    opacity: 0;
    display: block;
  }

  .q1 {
    color: #ffffff;
    animation: word-glow-in 1s cubic-bezier(0.16,1,0.3,1) 1.5s forwards;
  }
  .q2 {
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: word-glow-in 1s cubic-bezier(0.16,1,0.3,1) 2.0s forwards;
    position: relative;
  }

  @keyframes word-glow-in {
    from { opacity: 0; transform: translateY(100%) scale(0.9); filter: blur(8px); }
    to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* Glow behind "BRIGHTER" */
  .glow-text {
    position: relative;
  }
  .glow-text::after {
    content: 'BRIGHTER';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: blur(20px);
    opacity: 0.4;
    z-index: -1;
    animation: text-glow-pulse 2s ease-in-out 3s infinite;
  }
  @keyframes text-glow-pulse {
    0%, 100% { opacity: 0.3; filter: blur(20px); }
    50% { opacity: 0.6; filter: blur(30px); }
  }

  /* Tagline */
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.3);
    margin-top: 24px;
    opacity: 0;
    animation: fade-in 1s ease 2.8s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── BOTTOM ── */
  .bottom {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 3.2s forwards;
  }
  .bottom-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.2);
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="fire-glow"></div>

<!-- Embers -->
<div class="ember e1"></div>
<div class="ember e2"></div>
<div class="ember e3"></div>
<div class="ember e4"></div>
<div class="ember e5"></div>
<div class="ember e6"></div>
<div class="ember e7"></div>
<div class="ember e8"></div>
<div class="ember e9"></div>
<div class="ember e10"></div>
<div class="ember e11"></div>
<div class="ember e12"></div>
<div class="ember e13"></div>

<div class="overlay-vignette"></div>

<div class="splash">
  <div class="logo-wrap">
    <div class="logo-flame-wrap">
      <svg width="40" height="48" viewBox="0 0 40 48" fill="none">
        <path d="M20,2 C22.5,6 28,8 27,14 C26.5,17 24.5,18.5 25.5,22 C27.5,18 29,16 28.5,12 C31.5,16 32,20 30,26 C26,34 14,34 10,26 C8,20 8.5,16 11.5,12 C11,16 12.5,18 14.5,22 C15.5,18.5 13.5,17 13,14 C12,8 17.5,6 20,2Z" fill="url(#bf5)"/>
        <path d="M20,16 C21.5,19 24,20 23.5,23 C22,21 21,20.5 20,22 C19,20.5 18,21 16.5,23 C16,20 18.5,19 20,16Z" fill="rgba(255,255,200,0.55)"/>
        <path d="M15,34 C16,38 18,40 20,42 C22,40 24,38 25,34" fill="none" stroke="rgba(255,107,0,0.3)" stroke-width="1.5" stroke-linecap="round"/>
        <defs><linearGradient id="bf5" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#ffca28"/><stop offset="40%" stop-color="#ff6b00"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs>
      </svg>
    </div>
    <div class="logo-name">KASAI</div>
  </div>

  <div class="quote">
    <div class="q-line"><span class="q-word q1">BURN</span></div>
    <div class="q-line"><span class="q-word q2 glow-text">BRIGHTER</span></div>
  </div>

  <div class="tagline">Every single day</div>
</div>

<div class="bottom">
  <div class="bottom-tag">火 · Train like fire</div>
</div>

</body>
</html>
