<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KASAI — YOU VS YOU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── VIDEO BACKGROUND ── */
  .bg-video {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(6px) brightness(0.25) saturate(0.6);
    transform: scale(1.1);
  }
  /* Fallback animated gradient if no video */
  .bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #0a0008 0%, #0f0f1a 40%, #1a0a05 100%);
    animation: bg-shift 8s ease-in-out infinite alternate;
  }
  @keyframes bg-shift {
    0% { background: linear-gradient(135deg, #0a0008 0%, #0f0f1a 40%, #1a0a05 100%); }
    100% { background: linear-gradient(135deg, #0f0512 0%, #08060f 40%, #120800 100%); }
  }

  /* ── OVERLAYS ── */
  .overlay-grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .overlay-vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 20%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  /* ── CONTENT ── */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ── LOGO ── */
  .logo-wrap {
    opacity: 0;
    animation: logo-enter 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    margin-bottom: 40px;
  }
  @keyframes logo-enter {
    from { opacity: 0; transform: scale(0.6) translateY(20px); filter: blur(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  .logo-circle {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(145deg, rgba(255,107,0,0.15), rgba(255,45,85,0.08));
    border: 1px solid rgba(255,107,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 0 auto 12px;
  }
  .logo-circle::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 22px;
    border: 1px solid rgba(255,107,0,0.12);
    animation: ring-pulse 3s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.08); }
  }

  .logo-text {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.2em;
    text-align: center;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── MAIN QUOTE ── */
  .quote-line {
    overflow: hidden;
    display: flex;
    justify-content: center;
  }
  .quote-top .quote-word {
    animation: word-rise 0.9s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
  }
  .quote-vs {
    animation: vs-enter 0.6s cubic-bezier(0.34,1.56,0.64,1) 2.2s forwards;
  }
  .quote-bottom .quote-word {
    animation: word-rise 0.9s cubic-bezier(0.16,1,0.3,1) 2.8s forwards;
  }

  @keyframes word-rise {
    from { opacity: 0; transform: translateY(100%); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .quote-word {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(52px, 12vw, 100px);
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.04em;
    line-height: 1;
    opacity: 0;
    text-transform: uppercase;
  }

  .quote-vs {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 400;
    letter-spacing: 0.6em;
    color: rgba(255,107,0,0.6);
    text-transform: uppercase;
    opacity: 0;
    margin: 12px 0;
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  @keyframes vs-enter {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }
  .quote-vs::before, .quote-vs::after {
    content: '';
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,0,0.4));
  }
  .quote-vs::after {
    background: linear-gradient(90deg, rgba(255,107,0,0.4), transparent);
  }

  /* ── BOTTOM TAG ── */
  .bottom-tag {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 3.8s forwards;
  }
  @keyframes fade-in {
    to { opacity: 1; }
  }
  .tag-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.3);
    text-align: center;
  }

  /* ── AMBIENT PARTICLES ── */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
  }
  .p1 { width:3px; height:3px; left:15%; top:70%; background:#ff6b00; opacity:0; animation: float-up 4s ease-out 2s infinite; }
  .p2 { width:2px; height:2px; left:80%; top:75%; background:#ffca28; opacity:0; animation: float-up 5s ease-out 2.5s infinite; }
  .p3 { width:4px; height:4px; left:50%; top:80%; background:#ff2d55; opacity:0; animation: float-up 3.5s ease-out 3s infinite; }
  .p4 { width:2px; height:2px; left:30%; top:85%; background:#ff9500; opacity:0; animation: float-up 4.5s ease-out 1.5s infinite; }
  .p5 { width:3px; height:3px; left:70%; top:78%; background:#ff6b00; opacity:0; animation: float-up 5.5s ease-out 3.5s infinite; }

  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    15%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-200px) scale(0.2); }
  }

  /* ── HORIZONTAL FIRE LINE ── */
  .fire-line {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    z-index: 10;
    opacity: 0;
    animation: line-appear 1s ease 3.5s forwards;
  }
  @keyframes line-appear {
    to { opacity: 1; }
  }
  .fire-line-inner {
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, #ff6b00 20%, #ffca28 50%, #ff2d55 80%, transparent 100%);
    animation: line-glow 2s ease-in-out infinite alternate;
  }
  @keyframes line-glow {
    0% { opacity: 0.4; filter: blur(0px); }
    100% { opacity: 1; filter: blur(1px); }
  }
</style>
</head>
<body>

<!-- Background: Replace src with your own gym video MP4 -->
<!-- <div class="bg-video"><video src="gym-dark.mp4" autoplay muted loop playsinline></video></div> -->
<div class="bg-fallback"></div>
<div class="overlay-grain"></div>
<div class="overlay-vignette"></div>

<!-- Particles -->
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>

<!-- Content -->
<div class="splash">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-circle">
      <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
        <path d="M14,2 C15.5,4.2 18.5,5.5 18,8.5 C17.8,10 16.8,10.8 17.3,12.5 C18.5,10.2 19.5,9 19.2,6.8 C21,8.8 21.4,11.4 20.2,13.8 C17.2,13 11,13 9,13.5 C7.8,11.4 8.2,8.8 10,6.8 C9.7,9 10.7,10.2 11.9,12.5 C12.4,10.8 11.4,10 11.2,8.5 C10.7,5.5 12.5,4.2 14,2Z" fill="url(#sf1)"/>
        <path d="M14,8 C14.6,9.2 15.8,9.6 15.6,10.8 C15,10 14.6,9.8 14,10.5 C13.4,9.8 13,10 12.4,10.8 C12.2,9.6 13.4,9.2 14,8Z" fill="rgba(255,255,200,0.6)"/>
        <defs><linearGradient id="sf1" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#ffca28"/><stop offset="45%" stop-color="#ff6b00"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs>
      </svg>
    </div>
    <div class="logo-text">KASAI</div>
  </div>

  <!-- Quote -->
  <div class="quote-line quote-top"><div class="quote-word">YOU</div></div>
  <div class="quote-vs">VS</div>
  <div class="quote-line quote-bottom"><div class="quote-word">YOU</div></div>
</div>

<!-- Bottom -->
<div class="bottom-tag">
  <div class="tag-line">火 · Train like fire</div>
</div>

<!-- Fire line -->
<div class="fire-line"><div class="fire-line-inner"></div></div>

</body>
</html>
