<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KASAI — FIRE CUBE 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Outfit', sans-serif;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #020106;
  }

  /* Grid floor */
  .grid-floor {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) perspective(400px) rotateX(65deg);
    width: 200vw;
    height: 100vh;
    z-index: 1;
    background-image:
      linear-gradient(rgba(255,107,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: grid-scroll 3s linear infinite;
    transform-origin: bottom center;
  }
  @keyframes grid-scroll {
    from { background-position: 0 0; }
    to { background-position: 0 60px; }
  }

  /* ── 3D CUBE ── */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 800px;
    z-index: 5;
  }

  .cube-container {
    transform-style: preserve-3d;
    position: relative;
    animation: cube-hover 5s ease-in-out infinite;
  }
  @keyframes cube-hover {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .cube {
    width: 140px;
    height: 140px;
    position: relative;
    transform-style: preserve-3d;
    animation: cube-spin 10s linear infinite;
  }
  @keyframes cube-spin {
    0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg); }
  }

  .face {
    position: absolute;
    width: 140px;
    height: 140px;
    border: 1.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: visible;
  }

  .face-front {
    transform: translateZ(70px);
    background: linear-gradient(135deg, rgba(255,107,0,0.1), rgba(255,45,85,0.05));
    border-color: rgba(255,107,0,0.4);
    box-shadow: inset 0 0 30px rgba(255,107,0,0.1), 0 0 15px rgba(255,107,0,0.1);
  }
  .face-back {
    transform: rotateY(180deg) translateZ(70px);
    background: linear-gradient(135deg, rgba(255,45,85,0.1), rgba(255,107,0,0.05));
    border-color: rgba(255,45,85,0.35);
    box-shadow: inset 0 0 30px rgba(255,45,85,0.1);
  }
  .face-right {
    transform: rotateY(90deg) translateZ(70px);
    background: linear-gradient(135deg, rgba(255,202,40,0.08), rgba(255,107,0,0.05));
    border-color: rgba(255,202,40,0.3);
    box-shadow: inset 0 0 30px rgba(255,202,40,0.08);
  }
  .face-left {
    transform: rotateY(-90deg) translateZ(70px);
    background: linear-gradient(135deg, rgba(255,149,0,0.1), rgba(255,45,85,0.05));
    border-color: rgba(255,149,0,0.35);
    box-shadow: inset 0 0 30px rgba(255,149,0,0.08);
  }
  .face-top {
    transform: rotateX(90deg) translateZ(70px);
    background: linear-gradient(135deg, rgba(255,230,100,0.1), rgba(255,202,40,0.06));
    border-color: rgba(255,230,100,0.3);
    box-shadow: inset 0 0 30px rgba(255,230,100,0.08);
  }
  .face-bottom {
    transform: rotateX(-90deg) translateZ(70px);
    background: linear-gradient(135deg, rgba(255,45,85,0.12), rgba(200,20,40,0.06));
    border-color: rgba(255,45,85,0.3);
    box-shadow: inset 0 0 30px rgba(255,45,85,0.1);
  }

  /* KASAI text on front face */
  .face-text {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.2em;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Face symbols */
  .face-symbol {
    font-size: 36px;
    opacity: 0.5;
  }
  .face-front .face-symbol { color: #ff6b00; }
  .face-back .face-symbol { color: #ff2d55; }
  .face-right .face-symbol { color: #ffca28; }
  .face-left .face-symbol { color: #ff9500; }

  /* Inner fire core */
  .inner-fire {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    margin: -25px 0 0 -25px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,80,0.8), rgba(255,107,0,0.5), transparent);
    box-shadow: 0 0 50px rgba(255,107,0,0.5), 0 0 100px rgba(255,60,20,0.3);
    animation: inner-pulse 2s ease-in-out infinite;
  }
  @keyframes inner-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  /* Corner edges glow */
  .edge-glow {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #ffca28;
    box-shadow: 0 0 10px #ff6b00, 0 0 20px rgba(255,107,0,0.5);
    transform-style: preserve-3d;
  }
  /* 8 corners of the cube */
  .eg1 { transform: translate3d(-70px, -70px, 70px); }
  .eg2 { transform: translate3d(70px, -70px, 70px); }
  .eg3 { transform: translate3d(-70px, 70px, 70px); }
  .eg4 { transform: translate3d(70px, 70px, 70px); }
  .eg5 { transform: translate3d(-70px, -70px, -70px); }
  .eg6 { transform: translate3d(70px, -70px, -70px); }
  .eg7 { transform: translate3d(-70px, 70px, -70px); }
  .eg8 { transform: translate3d(70px, 70px, -70px); }

  /* Edge lines connecting corners */
  .edge-line {
    position: absolute;
    background: linear-gradient(90deg, rgba(255,107,0,0.3), rgba(255,202,40,0.1));
    transform-style: preserve-3d;
    height: 1px;
    width: 140px;
    top: 50%;
    left: 50%;
    margin-left: -70px;
    opacity: 0.3;
    animation: edge-shimmer 3s ease-in-out infinite;
  }
  @keyframes edge-shimmer {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* Cube shadow */
  .cube-shadow {
    position: fixed;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.1), transparent);
    filter: blur(15px);
    z-index: 4;
    animation: cs-sync 5s ease-in-out infinite;
  }
  @keyframes cs-sync {
    0%, 100% { width: 160px; opacity: 0.6; }
    50% { width: 100px; opacity: 0.3; }
  }

  /* ── TEXT ── */
  .logo-top {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 0.3s forwards;
  }
  .logo-name {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.3em;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .quote {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    white-space: nowrap;
  }
  .q1 {
    font-size: clamp(36px, 8vw, 60px);
    font-weight: 900;
    text-transform: uppercase;
    color: #fff;
    letter-spacing: 0.08em;
    display: block;
    opacity: 0;
    animation: cube-text 1s cubic-bezier(0.16,1,0.3,1) 1.5s forwards;
  }
  .q2 {
    font-size: clamp(36px, 8vw, 60px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    opacity: 0;
    animation: cube-text 1s cubic-bezier(0.16,1,0.3,1) 2s forwards;
  }
  .q2 span {
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .q-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.35);
    margin-top: 12px;
    display: block;
    opacity: 0;
    animation: cube-text 1s ease 2.8s forwards;
  }
  @keyframes cube-text {
    from { opacity: 0; transform: translateY(30px) rotateX(-10deg); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0) rotateX(0deg); filter: blur(0); }
  }

  .bottom-tag {
    position: fixed;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s ease 3.5s forwards;
  }
  .tag-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,149,0,0.2);
  }
  @keyframes fade-in { to { opacity: 1; } }

  .overlay-v {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse 60% 55% at 50% 48%, transparent 20%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid-floor"></div>
<div class="overlay-v"></div>
<div class="cube-shadow"></div>

<div class="scene">
  <div class="cube-container">
    <div class="cube">
      <div class="face face-front"><span class="face-text">KASAI</span></div>
      <div class="face face-back"><span class="face-symbol">火</span></div>
      <div class="face face-right"><span class="face-symbol">力</span></div>
      <div class="face face-left"><span class="face-symbol">魂</span></div>
      <div class="face face-top"><span class="face-symbol">炎</span></div>
      <div class="face face-bottom"><span class="face-symbol">闘</span></div>
      <div class="inner-fire"></div>
      <!-- Corner glows -->
      <div class="edge-glow eg1"></div>
      <div class="edge-glow eg2"></div>
      <div class="edge-glow eg3"></div>
      <div class="edge-glow eg4"></div>
      <div class="edge-glow eg5"></div>
      <div class="edge-glow eg6"></div>
      <div class="edge-glow eg7"></div>
      <div class="edge-glow eg8"></div>
    </div>
  </div>
</div>

<div class="logo-top"><div class="logo-name">KASAI</div></div>

<div class="quote">
  <span class="q1">BUILT</span>
  <span class="q2"><span>DIFFERENT</span></span>
  <span class="q-sub">No shortcuts</span>
</div>

<div class="bottom-tag">
  <div class="tag-text">火 · Train like fire</div>
</div>

</body>
</html>
