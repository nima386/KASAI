<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KASAI – E-Mail bestätigen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #07050f;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
  }

  /* phone shell */
  .phone {
    width: 340px;
    min-height: 680px;
    background: linear-gradient(170deg, #110d20 0%, #08060f 100%);
    border-radius: 44px;
    border: 1px solid rgba(255,107,0,0.14);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.8),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* status bar */
  .status-bar {
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-icons span {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-family: 'JetBrains Mono', monospace;
  }

  /* top glow */
  .top-glow {
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.22) 0%, transparent 65%);
    filter: blur(30px);
    pointer-events: none;
  }

  /* grid bg */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,100,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,100,0,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black, transparent);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black, transparent);
    pointer-events: none;
  }

  /* scroll area */
  .screen-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 28px 32px;
    position: relative;
    z-index: 1;
  }

  /* logo */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    align-self: flex-start;
  }
  .logo-pill {
    background: linear-gradient(135deg, rgba(255,120,0,0.18), rgba(255,45,85,0.1));
    border: 1px solid rgba(255,107,0,0.25);
    border-radius: 10px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-wordmark {
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #ffca28, #ff6b00, #ff2d55);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* envelope animation area */
  .envelope-stage {
    position: relative;
    width: 140px;
    height: 140px;
    margin-bottom: 24px;
  }

  /* orbiting rings */
  .orbit-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,107,0,0.12);
  }
  .orbit-ring:nth-child(1) { inset: 0; animation: orbit-spin 8s linear infinite; }
  .orbit-ring:nth-child(2) { inset: 10px; border-color: rgba(255,45,85,0.1); animation: orbit-spin 12s linear infinite reverse; }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* spinning dot on ring */
  .orbit-ring::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ff9500;
    box-shadow: 0 0 8px rgba(255,149,0,0.8);
    top: -2.5px;
    left: 50%;
    transform: translateX(-50%);
  }
  .orbit-ring:nth-child(2)::after {
    background: #ff2d55;
    box-shadow: 0 0 8px rgba(255,45,85,0.7);
    top: auto;
    bottom: -2.5px;
    left: auto;
    right: 20px;
    transform: none;
  }

  /* envelope icon */
  .env-center {
    position: absolute;
    inset: 20px;
    background: linear-gradient(145deg, rgba(255,120,0,0.18), rgba(255,45,85,0.1));
    border: 1.5px solid rgba(255,107,0,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: env-float 3s ease-in-out infinite;
  }
  @keyframes env-float {
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-5px) scale(1.02);}
  }

  /* check badge */
  .check-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff9500, #ff2d55);
    border: 2px solid #07050f;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: badge-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0.8s;
    transform: scale(0);
  }
  @keyframes badge-pop {
    from{transform:scale(0);}
    to{transform:scale(1);}
  }

  /* heading */
  .screen-title {
    font-size: 24px;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }
  .screen-title .fire {
    background: linear-gradient(135deg, #ffca28, #ff6b00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .screen-sub {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 28px;
  }
  .screen-sub .email-highlight {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,180,60,0.7);
    background: rgba(255,107,0,0.08);
    border: 1px solid rgba(255,107,0,0.15);
    border-radius: 6px;
    padding: 2px 8px;
    display: inline-block;
    margin-top: 4px;
  }

  /* email app buttons */
  .app-btns-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    margin-bottom: 12px;
    align-self: flex-start;
    width: 100%;
  }

  .app-btns {
    display: flex;
    gap: 8px;
    width: 100%;
    margin-bottom: 16px;
  }
  .app-btn {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .app-btn:active { transform: scale(0.94); }
  .app-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,120,0,0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .app-btn:hover::before { opacity: 1; }
  .app-btn:hover { border-color: rgba(255,107,0,0.2); }

  .app-btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .app-btn-name {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }
  .app-btn-arrow {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 10px;
    color: rgba(255,107,0,0.3);
  }

  /* main CTA */
  .main-cta {
    width: 100%;
    padding: 15px;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff9500, #ff6b00, #ff2d55);
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.05em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .main-cta::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: rgba(255,255,255,0.1);
    border-radius: 16px 16px 0 0;
  }
  .main-cta:active { opacity: 0.88; transform: scale(0.98); }

  /* resend link */
  .resend-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .resend-text {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .resend-btn {
    font-size: 12px;
    color: rgba(255,149,0,0.6);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255,149,0,0.3);
    transition: color 0.2s;
    padding: 0;
  }
  .resend-btn:hover { color: rgba(255,149,0,0.9); }

  /* progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    align-self: center;
  }
  .pd {
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
  }
  .pd:nth-child(1) { width: 20px; background: rgba(255,255,255,0.4); }
  .pd:nth-child(2) { width: 20px; background: rgba(255,255,255,0.4); }
  .pd:nth-child(3) { width: 32px; background: linear-gradient(90deg, #ff9500, #ff2d55); box-shadow: 0 0 6px rgba(255,107,0,0.5); }
  .pd:nth-child(4) { width: 20px; }

  /* bottom home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
  }

  /* particles */
  @keyframes p-up {
    0%{opacity:0;transform:translateY(0) scale(1);}
    20%{opacity:0.8;}
    100%{opacity:0;transform:translateY(-60px) scale(0.1);}
  }
  .spark {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: p-up 2s ease-out infinite;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="top-glow"></div>
  <div class="grid-bg"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time">20:42</div>
    <div class="status-icons">
      <span>●●●●</span>
      <span>LTE</span>
      <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="0" y="2" width="19" height="9" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/><rect x="1" y="3" width="13" height="7" rx="1.2" fill="rgba(255,149,0,0.7)"/><path d="M20,4.5 L20,7.5 C21.1,7.1 22,6.4 22,6 C22,5.6 21.1,4.9 20,4.5Z" fill="rgba(255,255,255,0.4)"/></svg>
    </div>
  </div>

  <div class="screen-body">

    <!-- Logo -->
    <div class="logo-row">
      <div class="logo-pill">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9,1 C9.9,2.4 11.8,3.2 11.6,5.2 C11.5,6.2 10.8,6.6 11.1,7.7 C11.9,6.3 12.5,5.6 12.3,4.2 C13.3,5.4 13.6,7.1 13,8.6 C10.5,8 7.5,8 6.8,8.6 C6.2,7.1 6.5,5.4 7.5,4.2 C7.3,5.6 7.9,6.3 8.7,7.7 C9,6.6 8.3,6.2 8.2,5.2 C8,3.2 9.1,2.4 9,1Z" fill="url(#fi2)"/>
          <defs><linearGradient id="fi2" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#ffca28"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs>
        </svg>
      </div>
      <div class="logo-wordmark">KASAI</div>
    </div>

    <!-- Progress indicator -->
    <div class="progress-dots">
      <div class="pd"></div>
      <div class="pd"></div>
      <div class="pd"></div>
      <div class="pd"></div>
    </div>

    <!-- Envelope animation -->
    <div class="envelope-stage">
      <div class="orbit-ring"></div>
      <div class="orbit-ring"></div>
      <div class="env-center">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <path d="M8,18 L26,30 L44,18" stroke="url(#env-g)" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="8" y="14" width="36" height="26" rx="5" stroke="url(#env-g)" stroke-width="2" fill="rgba(255,107,0,0.06)"/>
          <!-- lines hint -->
          <line x1="14" y1="24" x2="22" y2="24" stroke="rgba(255,149,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="28" x2="20" y2="28" stroke="rgba(255,149,0,0.18)" stroke-width="1.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="env-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffca28"/><stop offset="50%" stop-color="#ff6b00"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient>
          </defs>
        </svg>
      </div>
      <div class="check-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2.5,6 L5,8.5 L9.5,3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <!-- sparks -->
      <div class="spark" style="width:4px;height:4px;left:22px;top:18px;background:#ffca28;animation-delay:0s;animation-duration:2.2s;box-shadow:0 0 6px #ffca28;"></div>
      <div class="spark" style="width:3px;height:3px;left:105px;top:30px;background:#ff6b00;animation-delay:0.7s;animation-duration:1.8s;box-shadow:0 0 5px #ff6b00;"></div>
      <div class="spark" style="width:3px;height:3px;left:60px;top:110px;background:#ff9500;animation-delay:1.3s;animation-duration:2.5s;box-shadow:0 0 5px #ff9500;"></div>
    </div>

    <!-- Text -->
    <div class="screen-title">
      Fast fertig,<br>check deine<br><span class="fire">E-Mail! 🔥</span>
    </div>

    <div class="screen-sub">
      Wir haben einen Bestätigungslink an<br>
      <span class="email-highlight">deine@email.de</span>
      <br><br>
      Klicke auf den Link in der E-Mail<br>um dein KASAI-Konto zu aktivieren.
    </div>

    <!-- Email app shortcuts -->
    <div class="app-btns-label">// E-Mail-App öffnen</div>
    <div class="app-btns">
      <a href="googlegmail://" class="app-btn">
        <div class="app-btn-icon" style="background:rgba(234,67,53,0.12);border:1px solid rgba(234,67,53,0.2);">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M1,5 L9,10.5 L17,5" stroke="#EA4335" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="1" y="4" width="16" height="11" rx="2" stroke="#EA4335" stroke-width="1.2" fill="none"/>
          </svg>
        </div>
        <span class="app-btn-name">Gmail</span>
        <span class="app-btn-arrow">↗</span>
      </a>
      <a href="message://" class="app-btn">
        <div class="app-btn-icon" style="background:rgba(0,122,255,0.1);border:1px solid rgba(0,122,255,0.2);">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M1,5 L9,10.5 L17,5" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="1" y="4" width="16" height="11" rx="2" stroke="#007AFF" stroke-width="1.2" fill="none"/>
          </svg>
        </div>
        <span class="app-btn-name">Apple Mail</span>
        <span class="app-btn-arrow">↗</span>
      </a>
      <a href="ms-outlook://" class="app-btn">
        <div class="app-btn-icon" style="background:rgba(0,120,212,0.1);border:1px solid rgba(0,120,212,0.2);">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="1" y="4" width="11" height="11" rx="2" fill="#0078D4" fill-opacity="0.8"/>
            <text x="3.5" y="13" font-family="serif" font-size="8" fill="white" font-weight="bold">O</text>
            <path d="M12,7 L17,5 L17,13 L12,11 Z" fill="#0078D4" fill-opacity="0.5"/>
          </svg>
        </div>
        <span class="app-btn-name">Outlook</span>
        <span class="app-btn-arrow">↗</span>
      </a>
    </div>

    <!-- Main CTA -->
    <a href="#" class="main-cta">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2,8 L6,12 L14,4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Ich habe die E-Mail bestätigt
    </a>

    <!-- Resend -->
    <div class="resend-row">
      <span class="resend-text">Keine E-Mail erhalten?</span>
      <button class="resend-btn" onclick="this.textContent='Gesendet ✓';this.style.color='rgba(100,220,100,0.7)';setTimeout(()=>{this.textContent='Erneut senden';this.style.color='';},3000)">Erneut senden</button>
    </div>

  </div>

  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>
</div>

</body>
</html>
